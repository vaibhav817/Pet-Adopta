<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Adoption | Pet Adopa</title>
<link rel="icon" type="image/jpg" href="/images/pet.jpg">
<style>
:root{
--teal:#68a1a1;--dark:#1f3d3d;--bg:#f5f7f7;--white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:var(--bg);color:#2c3e50}
header{background:var(--teal);padding:15px 40px;position:sticky;top:0}
.navbar{display:flex;justify-content:space-between;align-items:center}
.logo{color:#fff;font-size:28px;font-weight:bold}
.nav-links{display:flex;gap:25px;list-style:none}
.nav-links a{text-decoration:none;color:#fff}
.nav-links a.active{background:#e8f4f4;color:var(--dark);padding:6px 10px;border-radius:6px}
.login-icon img{width:28px;height:28px}
.layout{display:flex}
.sidebar{width:220px;background:#2c3e50;color:white;min-height:100vh;padding:20px}
.sidebar a{display:block;text-decoration:none;color:white;background:#34495e;padding:10px;margin:10px 0;border-radius:6px;cursor:pointer}
.sidebar a.active-cat{background:var(--teal)}
.content{flex:1;padding:25px}
.title{text-align:center;font-size:42px;margin-bottom:25px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.card{background:white;border-radius:12px;padding:10px;box-shadow:0 4px 10px rgba(0,0,0,.1);transition:.3s}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:180px;object-fit:cover;border-radius:8px}
.price{font-weight:bold}
.btn{width:100%;margin-top:10px;padding:10px;border:none;background:var(--teal);color:white;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<header>
<div class="navbar">
<h2 class="logo">Pet Adopa</h2>
<ul class="nav-links">
<li><a href="/front_page">Home</a></li>
<li><a href="/Pet_Adoption" class="active">Pet Adoption</a></li>
<li><a href="/Petfood">Pet Food and other items</a></li>
<li><a href="/Map">Map</a></li>
<li><a href="/Name_Generator">Name Generator</a></li>
<li><a href="/Health_and_Safety">Health & Safety</a></li>
<li><a href="/Cart">Cart</a></li>
</ul>
<div class="login-icon"><a href="/logout"><img src="/images/login.jpg"></a></div>
</div>
</header>

<div class="layout">
<div class="sidebar">
  <h2>Category</h2>
  <a onclick="filterPets('all', this)" class="active-cat">All Pets</a>
  <a onclick="filterPets('cat', this)">Cat</a>
  <a onclick="filterPets('dog', this)">Dog</a>
  <a onclick="filterPets('rabbit', this)">Rabbit</a>
</div>

<div class="content">
<h1 class="title">Available Pets</h1>
<div class="grid" id="petGrid">
  <!-- Cards loaded dynamically from /api/pets -->
</div>
</div>
</div>

<script>
window.onload = function () {
  fetch('/api/pets')
    .then(res => res.json())
    .then(pets => {
      const grid = document.getElementById('petGrid');
      grid.innerHTML = '';

      pets.forEach(pet => {
        let imageSrc = '/images/pet.jpg';
        if (pet.petImage) {
          imageSrc = 'data:image/jpeg;base64,' + pet.petImage;
        } else if (pet.imageUrl) {
          imageSrc = pet.imageUrl;
        }

        const price = pet.price
          ? '₹' + Number(pet.price).toLocaleString('en-IN')
          : 'Free';

        const species = (pet.species || pet.petType || '').toLowerCase();

        grid.innerHTML += `
          <div class="card" data-category="${species}">
            <img src="${imageSrc}" alt="${pet.petName}">
            <h3>${pet.petName}</h3>
            <p>Age: ${pet.age}</p>
            <p class="price">${price}</p>
            <button class="btn" onclick="adoptPet(this, '${pet.petId || pet.id}', '${pet.petName}')">Adopt Now</button>
          </div>`;
      });
    })
    .catch(err => {
      console.error('Failed to load pets:', err);
    });
};

function filterPets(category, clickedLink) {
  // Update active sidebar link
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active-cat'));
  clickedLink.classList.add('active-cat');

  // Show/hide cards
  document.querySelectorAll('#petGrid .card').forEach(card => {
    if (category === 'all' || card.dataset.category === category) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
}

function adoptPet(btn, petId, petName) {
  const params = new URLSearchParams();
  params.append('petId', petId);
  params.append('petName', petName);

  fetch('/adoptPet', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: params.toString()
  }).then(() => {
    btn.textContent = '✅ Requested!';
    btn.disabled = true;
  }).catch(() => {
    btn.textContent = '✅ Requested!';
    btn.disabled = true;
  });
}
</script>

</body>
</html>
