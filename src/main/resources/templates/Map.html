   // ✅ Initialize Map
const map = L.map('map').setView([20.5937, 78.9629], 5); // India center

// ✅ OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

const locationCardsDiv = document.getElementById("locationCards");

// ✅ Fetch data from your CORRECT backend endpoint
fetch("/api/Shops")
.then(res => res.json())
.then(shops => {
    shops.forEach((shop, index) => {
        
        // 1. Add marker to map using matching entity fields (latitude, longitude, storeName, locationTiming)
        const marker = L.marker([shop.latitude, shop.longitude])
            .addTo(map)
            .bindPopup(`
                <div style="text-align:center; min-width:180px;">
                    <h3 style="color:#1f3d3d; margin:0 0 8px 0;">🏪 ${shop.storeName}</h3>
                    <p style="margin:4px 0; color:#555;">🕐 Timing: ${shop.locationTiming}</p>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${shop.latitude},${shop.longitude}"
                       target="_blank"
                       style="display:inline-block; margin-top:8px; padding:6px 14px; background:#68a1a1; color:white; border-radius:8px; text-decoration:none; font-size:13px;">
                        Get Directions
                    </a>
                </div>
            `);

        // 2. Dynamically build the location cards below the map
        locationCardsDiv.innerHTML += `
            <div class="location-card" onclick="focusLocation(${shop.latitude}, ${shop.longitude})">
                <h3>🏪 ${shop.storeName}</h3>
                <p>🕐 Timing: ${shop.locationTiming}</p>
                <p style="color:#68a1a1; font-weight:bold;">Pet Store</p>
                <button class="direction-btn" onclick="getDirections(${shop.latitude}, ${shop.longitude})">
                    🗺️ Get Directions
                </button>
            </div>
        `;
    });
})
.catch(err => console.error("Error loading shops:", err));

// ✅ Focus on location when card clicked
function focusLocation(lat, lng) {
    map.setView([lat, lng], 14);
}

// ✅ Open Google Maps directions
function getDirections(lat, lng) {
    window.open(
        `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`,
        '_blank'
    );
}

// ✅ Find user's current location
function findMyLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(position => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            map.setView([lat, lng], 12);
            L.marker([lat, lng]).addTo(map).bindPopup("📍 You are here!").openPopup();
        });
    } else {
        alert("Geolocation is not supported by your browser.");
    }
}

// ✅ Search location by city name
function searchLocation() {
    const query = document.getElementById("searchInput").value;
    if (!query) return;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
        .then(res => res.json())
        .then(data => {
            if (data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lng = parseFloat(data[0].lon);
                map.setView([lat, lng], 12);
            } else {
                alert("Location not found. Try another search.");
            }
        });
}
