  <meta charset="UTF-8">
  <title>Pet Food | Pet Adopa</title>
  <link rel="icon" type="image/jpg" href="/images/pet.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:       #68a1a1;
      --teal-dark:  #1f3d3d;
      --teal-light: #e8f4f4;
      --accent:     #e67e22;
      --accent-h:   #cf6d17;
      --white:      #ffffff;
      --card-bg:    #ffffffcc;
      --text:       #2c3e50;
      --muted:      #7f8c8d;
      --shadow:     0 8px 32px rgba(31,61,61,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f7f7;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--teal);
      padding: 15px 40px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(31,61,61,0.18);
    }
    .navbar { display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Playfair Display', serif; font-size: 28px; color: white; cursor: pointer; }
    .nav-links { display: flex; list-style: none; gap: 25px; }
    .nav-links li a {
      font-size: 15px; font-weight: 500; color: white;
      text-decoration: none; transition: color 0.25s, transform 0.2s;
      display: inline-block;
    }
    .nav-links li a:hover { color: var(--teal-dark); transform: translateY(-2px); }
    .login-icon img { width: 28px; height: 28px; cursor: pointer; }

    /* ── HERO BANNER ── */
    .hero {
      background: linear-gradient(120deg, var(--teal-dark) 0%, var(--teal) 100%);
      color: white;
      text-align: center;
      padding: 54px 20px 44px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '🐾';
      font-size: 180px;
      position: absolute;
      right: -20px; top: -30px;
      opacity: 0.08;
      pointer-events: none;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    .hero p { font-size: 16px; opacity: 0.85; }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 28px 20px 10px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 9px 22px;
      border-radius: 50px;
      border: 2px solid var(--teal);
      background: white;
      color: var(--teal-dark);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--teal);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(104,161,161,0.35);
    }

    /* ── SEARCH BAR ── */
    .search-wrap {
      display: flex;
      justify-content: center;
      padding: 14px 20px 24px;
    }
    .search-wrap input {
      width: 100%;
      max-width: 440px;
      padding: 11px 20px;
      border: 2px solid #cde5e5;
      border-radius: 50px 0 0 50px;
      outline: none;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: white;
      transition: border 0.2s;
    }
    .search-wrap input:focus { border-color: var(--teal); }
    .search-wrap button {
      padding: 11px 22px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 0 50px 50px 0;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
    }
    .search-wrap button:hover { background: var(--teal-dark); }

    /* ── PRODUCT GRID ── */
    .products-section { padding: 0 40px 60px; }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: var(--teal-dark);
      margin-bottom: 22px;
      padding-left: 4px;
      border-left: 4px solid var(--teal);
      padding-left: 14px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 26px;
    }

    /* ── PRODUCT CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.7);
    }
    .card:hover {
      transform: translateY(-7px);
      box-shadow: 0 18px 48px rgba(31,61,61,0.18);
    }
    .card-img-wrap {
      position: relative;
      background: var(--teal-light);
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-img-wrap .emoji {
      font-size: 80px;
      transition: transform 0.3s;
    }
    .card:hover .emoji { transform: scale(1.12) rotate(-5deg); }
    .badge {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      letter-spacing: 0.5px;
    }
    .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
    .card-category {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--teal);
      margin-bottom: 6px;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--teal-dark);
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.5;
      flex: 1;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .price {
      font-size: 20px;
      font-weight: 700;
      color: var(--teal-dark);
    }
    .price span { font-size: 13px; font-weight: 400; color: var(--muted); }

    /* Quantity control */
    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 12px 0;
    }
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--teal);
      background: white;
      color: var(--teal-dark);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
      font-weight: bold;
    }
    .qty-btn:hover { background: var(--teal); color: white; }
    .qty-input {
      width: 40px;
      text-align: center;
      border: 2px solid #cde5e5;
      border-radius: 8px;
      padding: 3px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
    }

    .add-btn {
      width: 100%;
      padding: 11px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.22s, transform 0.18s;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.3px;
    }
    .add-btn:hover { background: var(--teal-dark); transform: scale(1.02); }
    .add-btn.added {
      background: #27ae60;
    }

    /* ── FLOATING CART ── */
    .cart-fab {
      position: fixed;
      bottom: 30px; right: 30px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(230,126,34,0.45);
      transition: transform 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      z-index: 999;
      text-decoration: none;
    }
    .cart-fab:hover { background: var(--accent-h); transform: translateY(-3px); }
    .cart-count {
      background: white;
      color: var(--accent);
      border-radius: 50%;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 100px; right: 30px;
      background: var(--teal-dark);
      color: white;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 9999;
    }
    .toast.show { opacity: 1; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      .nav-links { display: none; }
      .products-section { padding: 0 16px 60px; }
      .hero h1 { font-size: 28px; }
    }
  </style>
</head>

<script>
  let cartCount = 0;

  function changeQty(btn, delta) {
    const input = btn.parentElement.querySelector('.qty-input');
    let val = parseInt(input.value) + delta;
    if (val < 1) val = 1;
    if (val > 99) val = 99;
    input.value = val;
  }

  function addToCart(btn, itemName, price) {
    const qtyInput = btn.parentElement.querySelector('.qty-input');
    const quantity = parseInt(qtyInput.value);

    // Send to Spring Boot backend
    const params = new URLSearchParams();
    params.append('itemName', itemName);
    params.append('quantity', quantity);
    params.append('price', price);

    fetch('/addToCart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    }).then(res => {
      if (res.ok || res.redirected) {
        cartCount += quantity;
        document.getElementById('cartCount').textContent = cartCount;

        // Visual feedback
        btn.textContent = '✅ Added!';
        btn.classList.add('added');
        setTimeout(() => {
          btn.textContent = 'Add to Cart 🛒';
          btn.classList.remove('added');
        }, 1500);

        showToast(`${quantity}x ${itemName} added to cart!`);
      }
    }).catch(() => {
      // fallback if server not running
      cartCount += quantity;
      document.getElementById('cartCount').textContent = cartCount;
      btn.textContent = '✅ Added!';
      btn.classList.add('added');
      setTimeout(() => {
        btn.textContent = 'Add to Cart 🛒';
        btn.classList.remove('added');
      }, 1500);
      showToast(`${quantity}x ${itemName} added to cart!`);
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function filterProducts(category, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.card').forEach(card => {
      if (category === 'all' || card.dataset.category === category) {
        card.style.display = 'flex';
      } else {
        card.style.display = 'none';
      }
    });
  }

  function searchProducts() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.card').forEach(card => {
      const name = card.dataset.name.toLowerCase();
      card.style.display = name.includes(query) ? 'flex' : 'none';
    });
  }

window.onload = function() {
    fetch("/api/products")
        .then(res => res.json())
        .then(products => {
            const grid = document.getElementById("productGrid");
            grid.innerHTML = "";
            
            products.forEach(product => {
                // Handle the byte array image conversion to base64
                let imageSrc = "/images/pet.jpg"; // fallback default image
                if (product.productImage) {
                    imageSrc = `data:image/jpeg;base64,${product.productImage}`;
                }

                grid.innerHTML += `
                    <div class="card" 
                         data-category="${product.productType.toLowerCase()}"
                         data-name="${product.productName}">
                        <div class="card-img-wrap">
                            <!-- Swapped emoji for actual uploaded image -->
                            <img src="${imageSrc}" alt="${product.productName}" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <div class="card-body">
                            <div class="card-category">${product.productType}</div>
                            <div class="card-name">${product.productName}</div>
                            <div class="card-desc">${product.productDescription}</div>
                            <div class="qty-wrap">
                                <button class="qty-btn" onclick="changeQty(this,-1)">−</button>
                                <input class="qty-input" type="number" value="1" min="1">
                                <button class="qty-btn" onclick="changeQty(this,1)">+</button>
                            </div>
                            <!-- Assuming you will add a price field to your entity later, hardcoded for now -->
                            <div class="price">₹499</div> 
                            <button class="add-btn"
                                onclick="addToCart(this, '${product.productName}', 499)">
                                Add to Cart 🛒
                            </button>
                        </div>
                    </div>`;
            });
        });
}
